name: Continuous Integration

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "VERSION"
      - "CHANGELOG.md"
  pull_request:
    paths-ignore:
      - "VERSION"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-docs:
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: trigger docs update in sum.golang.org and pkg.go.dev
        uses: essentialkaos/godoc-action@1d99db5d7f1c4fc42d26c9910ea374053d6961fb # v1

  static-code-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read .tool-versions
        uses: endorama/asdf-parse-tool-versions@e60863920ff5af9bf1c794ffbaaef91384b07eed # v1.6.0
        id: tool-versions
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}
      - name: go vet check
        run: make vet-check
      - name: go fmt check
        run: make fmt-check
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.4.0
          skip-cache: true
          args: "--timeout=3m"
      - name: deadcode
        run: |
          make deadcode
      - uses: apache/skywalking-eyes/header@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1 # v0.8.0
        name: Check license headers

  test-with-go:
    runs-on: ubuntu-24.04
    env:
      RABBITMQ_URL: amqp://guest:guest@localhost:5675
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read .tool-versions
        uses: endorama/asdf-parse-tool-versions@e60863920ff5af9bf1c794ffbaaef91384b07eed # v1.6.0
        id: tool-versions
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}
      - name: "Docker compose dependencies"
        uses: isbang/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        with:
          compose-file: "./docker-compose.yaml"
          down-flags: "--volumes"
      - name: Wait for RabbitMQ
        run: |
          deadline=$((SECONDS + 180))
          until docker compose -f ./docker-compose.yaml exec -T rabbitmq rabbitmqctl await_startup -t 5; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "RabbitMQ failed to become ready in time" >&2
              echo "::group::docker compose ps"
              docker compose -f ./docker-compose.yaml ps -a
              echo "::endgroup::"
              echo "::group::rabbitmq container logs"
              docker compose -f ./docker-compose.yaml logs rabbitmq
              echo "::endgroup::"
              exit 1
            fi
            echo "RabbitMQ not ready yet, retrying..."
            sleep 5
          done
          echo "RabbitMQ is up and running!"
      - name: test
        run: make test-coverage
      - name: send coverage to Coveralls
        if: vars.COVERALLS_ENABLED == 'true'
        env:
          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go tool goveralls -coverprofile=covprofile -service=github

  test-with-bats:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read .tool-versions
        uses: endorama/asdf-parse-tool-versions@e60863920ff5af9bf1c794ffbaaef91384b07eed # v1.6.0
        id: tool-versions
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}
      - name: build plugins
        run: make build-plugin-examples
      - name: build trento binary
        run: make build
      - name: Setup BATS
        uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d # v1
        with:
          bats-version: 1.11.1
      - name: run tests
        run: make test-build

  obs-sync:
    name: OBS sync
    if: >-
      fromJSON(vars.OBS_ENABLED)
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: trento-project/.github/.github/workflows/obs-sync.yaml@7ea6a8a1c3ed8a1f2185328219be4a724dd3686e # v1.8.0
    needs:
      - static-code-analysis
      - test-with-go
      - test-with-bats
    with:
      obs_project: ${{ vars.OBS_PROJECT_ROLLING }}
      obs_package: ${{ vars.OBS_PACKAGE }}
    secrets:
      gh_token: ${{ secrets.TRENTOBOT_GH_PAT }}
      obs_user: ${{ secrets.OBS_USER }}
      obs_pass: ${{ secrets.OBS_PASS }}
      obs_ssh_key: ${{ secrets.OBS_SSH_KEY }}
